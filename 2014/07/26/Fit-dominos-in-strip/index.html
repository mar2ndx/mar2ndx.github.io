<blockquote>
<p>In how many ways can one tile a 2 X N strip of square cells with 1 X 2 dominos?</p>
</blockquote>
<p><img src="/images/Dominos.png"></p>
<h3 id="Solution"><a href="#Solution" class="headerlink" title="Solution"></a>Solution</h3><p><strong>X(n+1) = X(n) + X(n-1)</strong></p>
<p>It’s a Fibonacci Series with X(1) = 1 and X(2) = 2.</p>
